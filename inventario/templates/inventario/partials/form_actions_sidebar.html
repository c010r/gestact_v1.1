<!-- Acciones Rápidas -->
<div class="card mb-4">
    <div class="card-header">
        <h5 class="mb-0"><i class="fas fa-bolt"></i> Acciones Rápidas</h5>
    </div>
    <div class="card-body">
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i>
                {% if object %}
                    Actualizar {{ device_type|title }}
                {% else %}
                    Crear {{ device_type|title }}
                {% endif %}
            </button>
            {% if object %}
                <a href="{{ detail_url }}" class="btn btn-outline-info">
                    <i class="fas fa-eye"></i> Ver Detalle
                </a>
                <a href="{% url 'inventario:bitacora_dispositivo' device_type object.pk %}" class="btn btn-outline-warning">
                    <i class="fas fa-history"></i> Ver Historial Completo
                </a>
            {% endif %}
            <button type="button" class="btn btn-outline-secondary" onclick="resetForm()">
                <i class="fas fa-undo"></i> Restablecer
            </button>
            <a href="{{ list_url }}" class="btn btn-outline-danger">
                <i class="fas fa-times"></i> Cancelar
            </a>
        </div>
    </div>
</div>
