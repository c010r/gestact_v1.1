{% load static %}
{# Template para el widget de selección jerárquica simple #}
<select name="{{ widget.name }}" {% include "django/forms/widgets/attrs.html" %}>
  {% for group_name, group_choices, group_index in widget.optgroups %}
    {% if group_name %}
      <optgroup label="{{ group_name }}">
    {% endif %}
    {% for option in group_choices %}
      <option value="{{ option.value }}"{% if option.selected %} selected{% endif %}{% for key, val in option.attrs.items %} {{ key }}="{{ val }}"{% endfor %}>
        {{ option.label }}
      </option>
    {% endfor %}
    {% if group_name %}
      </optgroup>
    {% endif %}
  {% endfor %}
</select>
